<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background tile — matches site's stone-950 -->
  <rect width="32" height="32" rx="7" fill="#0c0500"/>

  <!-- Steam wisps -->
  <path d="M11 10 C11.8 8.8 10.2 7.6 11 6.4"
        stroke="#fbbf24" stroke-width="1.4" stroke-linecap="round" fill="none"/>
  <path d="M15.5 9.5 C16.3 8.3 14.7 7.1 15.5 5.9"
        stroke="#fbbf24" stroke-width="1.4" stroke-linecap="round" fill="none"/>

  <!-- Cup rim -->
  <rect x="5.5" y="11" width="15" height="2.2" rx="1.1" fill="#f59e0b"/>

  <!-- Cup body -->
  <path d="M6.5 13.2 L19.5 13.2 L18 22 L8 22 Z" fill="#d97706"/>

  <!-- Highlight on cup body -->
  <path d="M8 13.8 L9.2 21.4 L8.5 21.4 L7.3 13.8 Z" fill="#f59e0b" opacity="0.4"/>

  <!-- Handle -->
  <path d="M19.5 15 C23.5 15 23.5 21 19.5 21"
        stroke="#d97706" stroke-width="2" stroke-linecap="round" fill="none"/>

  <!-- Saucer -->
  <ellipse cx="13" cy="23.2" rx="8" ry="1.4" fill="#92400e"/>
</svg>
